name: Deploy Bolão de Bico to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'bolao-de-bico/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bolao-de-bico/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: bolao-de-bico

      - name: Build
        run: npm run build
        working-directory: bolao-de-bico

      - uses: actions/upload-pages-artifact@v3
        with:
          path: bolao-de-bico/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
